<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - SKS HUB</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.container{
width:350px;
background:#111;
padding:30px;
border-radius:12px;
box-shadow:0 0 20px rgba(255,140,0,0.2);
}

.toggle{
display:flex;
margin-bottom:20px;
border-radius:8px;
overflow:hidden;
}

.toggle button{
flex:1;
padding:10px;
border:none;
cursor:pointer;
background:#222;
color:white;
}

.toggle .active{
background:#ff8c00;
color:black;
font-weight:bold;
}

.form{
display:none;
flex-direction:column;
}

.form.active{
display:flex;
}

input{
padding:12px;
margin:10px 0;
border:none;
border-radius:6px;
background:#222;
color:white;
}

.submit-btn{
padding:12px;
border:none;
border-radius:6px;
background:#ff8c00;
color:black;
font-weight:bold;
cursor:pointer;
}

.message{
margin-top:10px;
}

.error{color:red;}
.success{color:lightgreen;}

h2{
text-align:center;
color:#ff8c00;
}
</style>
</head>

<body>

<div class="container">

<div class="toggle">
<button id="loginTab" class="active" onclick="showLogin()">Login</button>
<button id="signupTab" onclick="showSignup()">Sign Up</button>
</div>

<!-- LOGIN -->
<div class="form active" id="loginForm">
<h2>Login</h2>
<input type="email" id="loginEmail" placeholder="Email">
<input type="password" id="loginPassword" placeholder="Password">
<button class="submit-btn" onclick="login()">Login</button>
</div>

<!-- SIGNUP -->
<div class="form" id="signupForm">
<h2>Create Account</h2>
<input type="text" id="signupName" placeholder="Full Name">
<input type="email" id="signupEmail" placeholder="Email">
<input type="password" id="signupPassword" placeholder="Password">
<button class="submit-btn" onclick="signup()">Sign Up</button>
</div>

<div class="message" id="message"></div>

</div>

<script>

function showLogin(){
loginForm.classList.add("active");
signupForm.classList.remove("active");
loginTab.classList.add("active");
signupTab.classList.remove("active");
}

function showSignup(){
signupForm.classList.add("active");
loginForm.classList.remove("active");
signupTab.classList.add("active");
loginTab.classList.remove("active");
}

// SIGN UP
function signup(){
let name = signupName.value;
let email = signupEmail.value;
let password = signupPassword.value;
let message = document.getElementById("message");

if(!name || !email || !password){
message.innerHTML = "Fill all fields";
message.className = "message error";
return;
}

let users = JSON.parse(localStorage.getItem("users")) || {};

if(users[email]){
message.innerHTML = "Account already exists";
message.className = "message error";
return;
}

users[email] = {name:name, password:password};
localStorage.setItem("users", JSON.stringify(users));

message.innerHTML = "Account created successfully 🎉";
message.className = "message success";
}

// LOGIN
function login(){
let email = loginEmail.value;
let password = loginPassword.value;
let message = document.getElementById("message");

let users = JSON.parse(localStorage.getItem("users")) || {};

if(users[email] && users[email].password === password){

localStorage.setItem("loggedInUser", email);
localStorage.setItem("loggedInName", users[email].name);

message.innerHTML = "Login successful ✅";
message.className = "message success";

setTimeout(()=>{
window.location.href = "congratulations.html";
},1000);

}else{
message.innerHTML = "Invalid email or password ❌";
message.className = "message error";
}

}

</script>

</body>
</html>
