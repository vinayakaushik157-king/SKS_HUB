<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - SKS HUB</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0b0b0b;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .card {
            background: #111;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 0 25px rgba(255, 140, 0, 0.3);
            animation: fadeIn 1s ease;
        }

        h1 {
            color: #ff8c00;
        }

        p {
            color: #ccc;
            margin: 15px 0;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            background: #ff8c00;
            color: black;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #e67e00;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>🎉 Congratulations!</h1>
        <p id="welcomeText">Welcome to SKS HUB</p>
        <button onclick="goHome()">Go to Home</button>
    </div>

    <script>
        // Retrieve the name stored during login
        let name = localStorage.getItem("loggedInName");

        if(name) {
            document.getElementById("welcomeText").innerText = 
                "Welcome " + name + " 👋, your login was successful!";
        }

        // AUTO REDIRECT AFTER 3 SECONDS
        setTimeout(() => {
            window.location.href = "home.html";
        }, 3000);

        function goHome() {
            window.location.href = "home.html";
        }
    </script>

</body>
</html>
