<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SKS HUB Railway Booking</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0b0b;
    color: white;
    overflow-x: hidden;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    padding: 20px 60px;
    background: black;
    position: relative;
    z-index: 10;
}

.logo {
    font-size: 26px;
    font-weight: bold;
    color: #ff8c00;
}

nav a {
    margin: 0 15px;
    color: white;
    text-decoration: none;
}

/* HERO */
.hero {
    text-align: center;
    padding: 100px 20px;
    background: linear-gradient(#1e3c72, #2a5298);
    position: relative;
    overflow: hidden;
}

.hero h1, .hero p {
    position: relative;
    z-index: 5;
}

.hero h1 {
    font-size: 42px;
}

/* 🚆 TRAIN ANIMATION */
.train-img {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 450px;
    opacity: 0.95;
    z-index: 2;
    pointer-events: none;
    animation: moveTrain 8s linear infinite;
}

@keyframes moveTrain {
    0% { transform: translateX(100vw); }
    100% { transform: translateX(-500px); }
}

/* SEARCH */
#search {
    display: block;
    margin: 40px auto;
    padding: 12px;
    width: 300px;
    border-radius: 6px;
    border: 1px solid #444;
    background: #222;
    color: white;
}

/* 🔥 FULL BACKGROUND SECTION */
.results-bg {
    padding: 80px 0;

    background:
        linear-gradient(rgba(20,20,20,0.6), rgba(10,10,10,0.8)),
        url("train heroes.jpg");

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    background-attachment: fixed;
}

/* 🔥 GLASS PANEL */
.results {
    max-width: 900px;
    margin: auto;
    padding: 40px 25px;

    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(12px);

    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.15);

    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

/* TRAIN CARDS */
.train-card {
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(8px);
    padding: 20px;
    margin: 15px 0;
    border-radius: 12px;
    border-left: 5px solid #ff8c00;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: 0.3s;
}

.train-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 0 15px rgba(255, 140, 0, 0.3);
}

.book {
    background: linear-gradient(45deg, #ff8c00, #ffb347);
    padding: 10px 18px;
    color: black;
    text-decoration: none;
    border-radius: 6px;
    font-weight: bold;
}

/* MOBILE */
@media (max-width: 600px) {
    .navbar {
        padding: 20px;
        flex-direction: column;
        align-items: center;
    }

    nav {
        margin-top: 10px;
    }

    .train-img {
        width: 280px;
    }

    .results-bg {
        background-attachment: scroll;
    }

    .train-card {
        flex-direction: column;
        text-align: center;
        gap: 10px;
    }
}
</style>
</head>

<body>

<header class="navbar">
    <div class="logo">🚆 SKS HUB</div>
    <nav>
        <a href="index.html">Home</a>
        <a href="flight.html">Flights</a>
        <a href="bus.html">Bus</a>
        <a href="railways.html">Railways</a>
        <a href="hotel booking.html">Hotel</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<!-- HERO -->
<section class="hero">
    <h1>Book Your Train</h1>
    <p>Fast • Safe • Comfortable</p>
    <img src="train-removebg-preview.png" class="train-img" alt="Moving Train">
</section>

<input type="text" id="search" placeholder="Search train, city, or destination...">

<!-- 🔥 BACKGROUND + GLASS PANEL -->
<section class="results-bg">
    <div class="results" id="results"></div>
</section>

<script>
const trains = [
    {name: "Chennai Express", from: "Chennai", to: "Bangalore"},
    {name: "Rajdhani Express", from: "Chennai", to: "Delhi"},
    {name: "Duronto Express", from: "Chennai", to: "Mumbai"},
    {name: "Shatabdi Express", from: "Delhi", to: "Chandigarh"},
    {name: "Vande Bharat", from: "Chennai", to: "Mysore"}
];

const container = document.getElementById("results");

function displayTrains(list) {
    container.innerHTML = "";

    if (list.length === 0) {
        container.innerHTML = "<p style='text-align:center; color:#aaa;'>No trains found.</p>";
        return;
    }

    list.forEach(train => {
        container.innerHTML += `
        <div class="train-card">
            <div>
                <h3 style="margin:0;">${train.name}</h3>
                <p style="color:#bbb; margin-top:5px;">
                    ${train.from} → ${train.to}
                </p>
            </div>
            <a class="book" href="railway ticket.html?train=${encodeURIComponent(train.name)}&from=${train.from}&to=${train.to}">
                Book Now
            </a>
        </div>`;
    });
}

displayTrains(trains);

/* SEARCH */
document.getElementById("search").addEventListener("input", function() {
    const value = this.value.toLowerCase();

    const filtered = trains.filter(t =>
        t.name.toLowerCase().includes(value) ||
        t.from.toLowerCase().includes(value) ||
        t.to.toLowerCase().includes(value)
    );

    displayTrains(filtered);
});
</script>

</body>
</html>
