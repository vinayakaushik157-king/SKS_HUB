<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SKS HUB Hotel Ticket</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0b0b;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.ticket{
width:650px;
background:white;
color:black;
border-radius:10px;
overflow:hidden;
box-shadow:0 0 25px rgba(0,0,0,0.6);
}

/* HEADER */

.header{
background:#ff8c00;
padding:15px;
display:flex;
justify-content:space-between;
font-weight:bold;
}

/* HOTEL INFO */

.hotel-info{
padding:20px;
border-bottom:2px dashed #ccc;
}

.hotel-name{
font-size:22px;
font-weight:bold;
color:#ff8c00;
}

/* DETAILS */

.details{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
padding:20px;
}

.box{
background:#f4f4f4;
padding:10px;
border-radius:6px;
}

.label{
font-size:13px;
color:#555;
}

.value{
font-size:18px;
font-weight:bold;
}

/* BUTTONS */

.buttons{
text-align:center;
padding:20px;
}

.btn{
background:#ff8c00;
border:none;
padding:12px 20px;
margin:5px;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

.btn:hover{
background:#ff6a00;
}

</style>

</head>

<body>

<div class="ticket">

<div class="header">
<div>🏨 SKS HUB Hotel Booking</div>
<div>Booking ID: 8745621</div>
</div>

<div class="hotel-info">
<div class="hotel-name">Grand Palace Hotel</div>
Luxury • Comfortable • Premium Stay
</div>

<div class="details">

<div class="box">
<div class="label">CITY</div>
<div class="value">Chennai</div>
</div>

<div class="box">
<div class="label">ROOM TYPE</div>
<div class="value">Deluxe</div>
</div>

<div class="box">
<div class="label">CHECK-IN</div>
<div class="value">Selected Date</div>
</div>

<div class="box">
<div class="label">CHECK-OUT</div>
<div class="value">Selected Date</div>
</div>

<div class="box">
<div class="label">GUESTS</div>
<div class="value">2 Guests</div>
</div>

<div class="box">
<div class="label">PRICE</div>
<div class="value">₹3500</div>
</div>

</div>

<div class="buttons">

<button class="btn" onclick="window.print()">Download Ticket</button>

<button class="btn" onclick="location.href='hotel booking.html'">
Book Another Hotel
</button>

</div>

</div>

</body>
</html>
