<!DOCTYPE html>
<html>
<head>
<title>Booking Confirmed</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#111;
padding:40px;
border-radius:12px;
text-align:left;
width:400px;
box-shadow:0 0 25px rgba(0,0,0,0.6);
}

h1{
color:#ff8c00;
text-align:center;
}

.detail{
margin:10px 0;
color:#ccc;
}

</style>

</head>

<body>

<div class="box">

<h1>🎉 Booking Confirmed</h1>

<div class="detail" id="hotel"></div>
<div class="detail" id="name"></div>
<div class="detail" id="email"></div>
<div class="detail" id="dates"></div>
<div class="detail" id="guests"></div>
<div class="detail" id="payment"></div>

<p style="text-align:center;margin-top:20px;">
Thank you for choosing SKS HUB ❤️
</p>

</div>

<script>

const params = new URLSearchParams(window.location.search);

document.getElementById("hotel").innerText =
"🏨 Hotel: " + params.get("hotel");

document.getElementById("name").innerText =
"👤 Name: " + params.get("name");

document.getElementById("email").innerText =
"📧 Email: " + params.get("email");

document.getElementById("dates").innerText =
"📅 Stay: " + params.get("checkin") + " → " + params.get("checkout");

document.getElementById("guests").innerText =
"👥 Guests: " + params.get("guests");

document.getElementById("payment").innerText =
"💳 Payment: " + params.get("payment");

</script>

</body>
</html>
