<!DOCTYPE html>
<html>
<head>
<title>SKS HUB - Bus Booking</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: 'Segoe UI', Arial;
}

/* BODY WITH bus1.png */
body{
background:linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.95)),
 url('bus1.jpeg'); 
background-size:cover;
background-position:center;
background-attachment:fixed;
color:white;
overflow-x:hidden;
}

/* NAVBAR */
.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 60px;
background:rgba(0,0,0,0.9);
backdrop-filter:blur(10px);
position:sticky;
top:0;
z-index:100;
}

.logo{
display:flex;
align-items:center;
gap:10px;
font-size:24px;
font-weight:bold;
color:#ff8c00;
}

.logo img{
height:38px;
}

nav a{
margin:0 15px;
text-decoration:none;
color:#ddd;
font-size:16px;
transition:0.3s;
}

nav a:hover{
color:#ff8c00;
}

/* HERO WITH NEW IMAGE */
.hero{
height:55vh;
background:linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.85)),
url('hero bus.jpeg');
background-size:cover;
background-position:center;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
position:relative;
overflow:hidden;
}

.hero h1{
font-size:48px;
letter-spacing:1px;
}

.hero span{
color:#ff8c00;
}

.hero p{
margin-top:10px;
color:#ddd;
}

/* BUS ANIMATION */
.bus{
position:absolute;
bottom:10px;
right:-200px;
width:180px;
animation:busMove 10s linear infinite;
transform: scaleX(-1);
}

@keyframes busMove{
0%{ right:-200px; }
100%{ right:120%; }
}

/* BOOKING CARD */
.booking{
background: rgba(0,0,0,0.6);
backdrop-filter: blur(15px);
border: 1px solid rgba(255,255,255,0.1);
padding:35px;
margin:50px auto;
width:420px;
border-radius:15px;
text-align:center;
box-shadow:0 0 30px rgba(255,140,0,0.2);
transition:0.3s;
}

.booking:hover{
transform:translateY(-5px);
}

.booking h2{
margin-bottom:20px;
color:#ff8c00;
}

.booking input,
.booking select{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:none;
background:#1c1c1c;
color:white;
transition:0.3s;
}

.booking input:focus,
.booking select:focus{
outline:none;
box-shadow:0 0 10px #ff8c00;
background:#222;
}

/* BUTTON */
.booking button{
background:linear-gradient(45deg,#ff8c00,#ffa733);
border:none;
padding:14px;
width:100%;
border-radius:8px;
cursor:pointer;
font-size:16px;
font-weight:bold;
transition:0.3s;
}

.booking button:hover{
transform:scale(1.05);
box-shadow:0 0 15px #ff8c00;
}

/* FOOTER */
footer{
text-align:center;
padding:25px;
background:rgba(0,0,0,0.9);
margin-top:50px;
color:#aaa;
font-size:14px;
}

/* RESPONSIVE */
@media(max-width:768px){
.navbar{
flex-direction:column;
gap:10px;
}

.hero h1{
font-size:32px;
}

.booking{
width:90%;
}
}
</style>
</head>

<body>

<header class="navbar">
<div class="logo">
<img src="logo.jpeg">
<span>SKS HUB</span>
</div>

<nav>
<a href="index.html">Home</a>
<a href="flight.html">Flights</a>
<a href="bus.html">Bus</a>
<a href="railways.html">Railways</a>
<a href="cab.html">Cab</a>
<a href="hotel booking.html">Hotel</a>
<a href="contact.html">Contact</a>
</nav>
</header>

<section class="hero">
<h1>Travel by <span>Bus</span></h1>-+
<p>Comfortable and affordable journeys</p>
<img class="bus" src="bus.png">
</section>

<section class="booking">
<h2>🚌 Bus Ticket Booking</h2>

<form action="bus ticket.html" method="GET">

<input type="text" name="name" placeholder="Passenger Name" required>

<input list="cities" name="from" placeholder="From City" required>
<input list="cities" name="to" placeholder="To City" required>

<datalist id="cities">
<option value="Chennai">
<option value="Coimbatore">
<option value="Bangalore">
<option value="Hyderabad">
<option value="Madurai">
</datalist>

<input type="date" name="date" required>

<select name="passengers">
<option>1 Passenger</option>
<option>2 Passengers</option>
<option>3 Passengers</option>
</select>

<select name="busType">
<option>AC Sleeper</option>
<option>Non-AC Seater</option>
<option>Luxury Volvo</option>
<option>Sleeper</option>
<option>Double-Decker Sleeper</option>
</select>

<input type="tel" name="phone" placeholder="Phone Number" pattern="[0-9]{10}" required>

<button type="submit">Generate Ticket</button>

</form>
</section>

<footer>
<p>© 2026 SKS HUB Travel Platform</p>
</footer>

</body>
</html>
