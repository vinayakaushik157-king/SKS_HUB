<!DOCTYPE html>
<html>
<head>
<title>Passenger Details</title>

<style>
body{
background:#0b0b0b;
color:white;
font-family:Arial;
text-align:center;
}

.box{
background:#111;
width:400px;
margin:50px auto;
padding:30px;
border-radius:10px;
box-shadow:0 0 15px rgba(255,140,0,0.4);
}

input,select{
width:100%;
padding:12px;
margin:8px 0;
border-radius:6px;
border:none;
}

button{
width:100%;
padding:14px;
background:#ff8c00;
border:none;
border-radius:6px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="box">

<h2>👤 Passenger Details</h2>

<form onsubmit="return saveData()">

<label>Train</label>
<input id="train" name="train" readonly>

<label>From</label>
<input id="from" name="from" readonly>

<label>To</label>
<input id="to" name="to" readonly>

<input type="date" id="date" required>

<input type="text" id="name" placeholder="Passenger Name" required>

<input type="number" id="age" placeholder="Age" required>

<select id="gender">
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>

<input type="number" id="passengers" placeholder="Passengers" min="1" max="10" required>

<p id="price"></p>

<button>Proceed to Payment</button>

</form>

</div>

<script>
const params = new URLSearchParams(window.location.search);

document.getElementById("train").value = params.get("train");
document.getElementById("from").value = params.get("from");
document.getElementById("to").value = params.get("to");

document.getElementById("date").valueAsDate = new Date();

/* PRICE */
document.getElementById("passengers").addEventListener("input", ()=>{
let p = document.getElementById("passengers").value;
document.getElementById("price").innerText = "Total: ₹" + (p*500);
});

/* SAVE DATA */
function saveData(){
const booking = {
train: document.getElementById("train").value,
from: document.getElementById("from").value,
to: document.getElementById("to").value,
date: document.getElementById("date").value,
name: document.getElementById("name").value,
age: document.getElementById("age").value,
gender: document.getElementById("gender").value,
passengers: document.getElementById("passengers").value
};

localStorage.setItem("ticket", JSON.stringify(booking));

window.location.href = "payment.html";
return false;
}
</script>

</body>
</html>
