<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SKS HUB - Flights</title>

<style>
:root { --primary: #ff8c00; --glass: rgba(255, 255, 255, 0.1); }

body {
margin: 0;
font-family: 'Segoe UI', sans-serif;
background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.7)),
url('https://images.unsplash.com/photo-1436491865332-7a61a109cc05?auto=format&fit=crop&q=80&w=2074');
background-size: cover;
background-attachment: fixed;
color: white;
overflow-x: hidden;
min-height: 100vh;
}

/* NAVBAR */
.navbar {
display: flex;
justify-content: space-between;
align-items: center;
padding: 15px 60px;
background: rgba(0,0,0,0.9);
backdrop-filter: blur(10px);
position: sticky;
top: 0;
z-index: 100;
}

.logo {
color: var(--primary);
font-weight: bold;
font-size: 24px;
text-decoration: none;
flex: 1;
}

.nav-center {
display: flex;
justify-content: center;
flex: 3;
}

.nav-right {
display: flex;
justify-content: flex-end;
flex: 1;
}

nav a {
margin: 0 12px;
text-decoration: none;
color: white;
font-size: 15px;
transition: 0.3s;
}

nav a:hover {
color: var(--primary);
}

.login-btn {
background: var(--primary);
border: none;
padding: 8px 18px;
border-radius: 5px;
color: white;
cursor: pointer;
font-weight: bold;
}

/* HERO */
.hero {
height: 30vh;
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
position: relative;
}

.hero h1 {
font-size: 50px;
margin: 0;
}

.hero p {
font-size: 18px;
margin-top: 10px;
}

/* PLANE ANIMATION - Positioned in the gap */
        .plane-track {
            position: absolute;
             /* bottom: -60px;   */
            margin-top: -20px;
            left: 0;
            width: 100%;
            height: 100px;
            pointer-events: none;
            z-index: 1;
        }


.plane {
position: absolute;
left: -300px;
width: 240px;
animation: fly 14s linear infinite;
opacity: 0.7;
}

@keyframes fly {
0% { left: -300px; }
100% { left: 110%; }
}

/* FORM */
.booking {
background: var(--glass);
backdrop-filter: blur(15px);
border: 1px solid rgba(255,255,255,0.2);
padding: 30px 40px;
margin: 0 auto 60px;
width: 450px;
border-radius: 20px;
text-align: center;
}

.booking input, .booking select {
width: 100%;
padding: 12px;
margin: 10px 0;
border-radius: 8px;
border: 1px solid rgba(255,255,255,0.3);
background: rgba(0,0,0,0.5);
color: white;
}

.btn {
width: 100%;
padding: 15px;
margin-top: 20px;
border: none;
border-radius: 8px;
background: var(--primary);
color: white;
font-weight: bold;
font-size: 17px;
cursor: pointer;
}
</style>

</head>
<body>

<header class="navbar">
<a href="#" class="logo">SKS HUB</a>

<nav class="nav-center">
<a href="index.html">Home</a>
<a href="flight.html" style="color:var(--primary);">Flights</a>
<a href="bus.html">Bus</a>
<a href="railways.html">Railways</a>
<a href="cab.html">Cab</a>
<a href="hotel booking.html">Hotels</a>
<a href="contact.html">Contact</a>
</nav>

<nav class="nav-right">
<button class="login-btn">Login</button>
</nav>
</header>

<section class="hero">
<h1>Fly with <span style="color:var(--primary)">SKS HUB</span></h1>
<p>Enter details to generate your ticket</p>

<div class="plane-track">
<img class="plane" src="flight 2.png">
</div>
</section>

<!-- ✅ FIXED HERE -->
<form action="flight payment.html" method="GET" class="booking">
<h2>Passenger Details</h2>

<input type="text" name="name" placeholder="Full Name" required>
<input type="number" name="age" placeholder="Age" required>

<div style="display:flex; gap:10px;">
<input type="text" name="from" placeholder="From City" required>
<input type="text" name="to" placeholder="To City" required>
</div>

<input type="date" name="date" required>

<select name="class">
<option>Economy Class</option>
<option>Business Class</option>
<option>First Class</option>
</select>

<button type="submit" class="btn">Generate Ticket</button>
</form>

</body>
</html>
