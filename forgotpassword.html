<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SKS HUB - Reset Password</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b0b0b;
    color: white;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 60px;
    background: black;
}

.logo {
    font-size: 26px;
    font-weight: bold;
    color: #ff8c00;
}

nav a {
    margin: 0 18px;
    text-decoration: none;
    color: white;
    font-size: 18px;
}

nav a:hover {
    color: #ff8c00;
}

/* RESET CONTAINER */
.reset-container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 80vh;
}

.reset-box {
    background: #111;
    padding: 40px;
    width: 350px;
    border-radius: 10px;
    border: 1px solid #ff8c00;
    text-align: center;
}

.reset-box h2 {
    color: #ff8c00;
    margin-bottom: 15px;
}

.reset-box p {
    font-size: 14px;
    color: #ccc;
    margin-bottom: 20px;
}

/* INPUT */
.reset-box input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 6px;
    border: none;
}

/* BUTTON */
.reset-box button {
    background: #ff8c00;
    border: none;
    padding: 12px;
    width: 100%;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
}

/* BACK LINK */
.back {
    margin-top: 15px;
    font-size: 14px;
}

.back a {
    color: #ff8c00;
    text-decoration: none;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 30px;
    background: black;
    color: #aaa;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<header class="navbar">
    <div class="logo">SKS HUB</div>

    <nav>
        <a href="index.html">Home</a>
        <a href="flight.html">Flights</a>
        <a href="bus.html">Bus</a>
        <a href="railways.html">Railways</a>
        <a href="roombooking.html">Hotels</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<!-- RESET PASSWORD SECTION -->
<div class="reset-container">
    <div class="reset-box">

        <h2>Forgot Password</h2>

        <p>Enter your registered email address and we will send you a password reset link.</p>

        <form action="userlogin.html">
            <input type="email" placeholder="Enter your email" required>
            <button type="submit">Send Reset Link</button>
        </form>

        <div class="back">
            <p><a href="userlogin.html">← Back to Login</a></p>
        </div>

    </div>
</div>

<!-- FOOTER -->
<footer>
    <p>© 2026 SKS HUB Travel Platform</p>
</footer>

</body>
</html>
