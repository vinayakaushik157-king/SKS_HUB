<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SKS HUB - Payment</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
background:
linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.95)),
url('hotel.png');
background-size:cover;
background-attachment:fixed;
}

.navbar{
display:flex;
justify-content:space-between;
padding:20px 60px;
background:black;
border-bottom:2px solid #ff8c00;
}

.logo{
font-size:26px;
color:#ff8c00;
font-weight:bold;
}

.container{
max-width:500px;
margin:60px auto;
}

.form-box{
background:#111;
padding:25px;
border-radius:12px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:6px;
background:#222;
color:white;
}

.section{
color:#ff8c00;
margin-top:10px;
}

button{
width:100%;
padding:14px;
background:#ff8c00;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

/* guest */
.guest-control{
display:flex;
justify-content:space-between;
background:#222;
padding:10px;
border-radius:8px;
}

.guest-control button{
width:35px;
background:#ff8c00;
border:none;
}

.guest-control input{
width:50px;
text-align:center;
}

</style>
</head>

<body>

<header class="navbar">
<div class="logo">🏨 SKS HUB</div>
</header>

<div class="container">

<div class="form-box">

<h2 style="text-align:center;color:#ff8c00;">Complete Booking</h2>

<form action="hotelconfirm.html" method="GET">

<!-- PASS HOTEL -->
<input type="hidden" name="hotel" id="hotelField">

<div class="section">Guest Details</div>

<input type="text" name="name" placeholder="Full Name" required>
<input type="email" name="email" placeholder="Email" required>

<div class="section">Stay Details</div>

<input type="date" name="checkin" required>
<input type="date" name="checkout" required>

<label>Guests</label>
<div class="guest-control">
<button type="button" onclick="dec()">−</button>
<input id="guest" name="guests" value="1" readonly>
<button type="button" onclick="inc()">+</button>
</div>

<div class="section">Payment</div>

<input list="pay" name="payment" placeholder="Payment Method" required>

<datalist id="pay">
<option value="Cash on Arrival">
<option value="Credit Card">
<option value="Debit Card">
<option value="UPI">
</datalist>

<button type="submit">Confirm Booking</button>

</form>

</div>

</div>

<script>

/* GET HOTEL */
const params = new URLSearchParams(window.location.search);
const hotel = params.get("hotel");

document.getElementById("hotelField").value = hotel;

/* GUEST */
let g=1;
function inc(){ g++; guest.value=g; }
function dec(){ if(g>1){ g--; guest.value=g; } }

</script>

</body>
</html>
