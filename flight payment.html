<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SKS HUB - Payment</title>

<style>
:root { --primary: #ff8c00; --glass: rgba(255,255,255,0.1); }

body{
margin:0;
font-family:'Segoe UI',sans-serif;
color:white;

background:
linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.7)),
url('https://images.unsplash.com/photo-1436491865332-7a61a109cc05?auto=format&fit=crop&q=80&w=2074');

background-size:cover;
background-attachment:fixed;

display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.payment-box{
background:var(--glass);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,0.2);
padding:30px 40px;
width:420px;
border-radius:20px;
text-align:center;
}

input, select{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid rgba(255,255,255,0.3);
background:rgba(0,0,0,0.5);
color:white;
}

.btn{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:8px;
background:var(--primary);
color:white;
font-weight:bold;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
transform:scale(1.05);
background:#ff9d1a;
}
</style>

</head>
<body>

<div class="payment-box">

<h2>Secure Payment</h2>

<form action="flightticket.html" method="GET">

<!-- PASS FLIGHT DATA -->
<input type="hidden" name="name" id="name">
<input type="hidden" name="age" id="age">
<input type="hidden" name="from" id="from">
<input type="hidden" name="to" id="to">
<input type="hidden" name="date" id="date">
<input type="hidden" name="class" id="class">

<!-- PAYMENT DETAILS -->
<input type="text" name="cardname" placeholder="Card Holder Name" required>
<input type="text" name="cardnumber" placeholder="Card Number" required>
<input type="month" name="expiry" required>
<input type="password" name="cvv" placeholder="CVV" required>

<select name="payment">
<option>Credit Card</option>
<option>Debit Card</option>
<option>UPI</option>
</select>

<button class="btn">Pay & Generate Ticket</button>

</form>

</div>

<script>
const params = new URLSearchParams(window.location.search);

// PASS DATA FROM flight.html → payment → ticket
document.getElementById("name").value = params.get("name");
document.getElementById("age").value = params.get("age");
document.getElementById("from").value = params.get("from");
document.getElementById("to").value = params.get("to");
document.getElementById("date").value = params.get("date");
document.getElementById("class").value = params.get("class");
</script>

</body>
</html>
